- Validate generation options before inference.
- Return generated text and simple performance metrics.
- Keep backend code testable and straightforward.

Constraints:
- Do not add SQL or persistent backend storage unless explicitly requested.
- Do not add hosted LLM provider integrations unless explicitly requested.
- Keep architecture-specific model logic isolated from API route handlers.

Verification:
- Add or run focused backend tests when backend behavior changes.
- Prefer simple fixtures or mocked adapters for early tests.
